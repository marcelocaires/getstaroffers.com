services:
  getstaroffers.com:
    build: .
    container_name: getstaroffers.com
    restart: unless-stopped
    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.pressel.rule=Host(`seudominio.com.br`)"
      - "traefik.http.routers.pressel.entrypoints=websecure"
      - "traefik.http.routers.pressel.tls=true"
      - "traefik.http.routers.pressel.tls.certresolver=letsencrypt"

      - "traefik.http.services.pressel.loadbalancer.server.port=80"

    networks:
      - web

networks:
  web:
    external: true