services:
  getstaroffers:
    image: nginx:alpine
    container_name: getstaroffers
    restart: unless-stopped

    volumes:
      - ./html:/usr/share/nginx/html:ro

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.getstaroffers.rule=Host(`getstaroffers.com`) || Host(`www.getstaroffers.com`)"
      - "traefik.http.routers.getstaroffers.entrypoints=websecure"
      - "traefik.http.routers.getstaroffers.tls=true"
      - "traefik.http.routers.getstaroffers.tls.certresolver=letsencrypt"
      - "traefik.http.services.getstaroffers.loadbalancer.server.port=80"

    networks:
      - web

networks:
  web:
    external: true