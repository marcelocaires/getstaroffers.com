<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pop-up Funcional - Tailwind CSS v4</title>
  
  <!-- NOVA IMPORTAÇÃO OFICIAL DO TAILWIND CSS v4 VIA CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-150 min-h-screen flex flex-col items-center justify-center font-sans">

  <!-- Bloco Centralizador da Tela -->
  <div class="text-center p-6 bg-white rounded-2xl shadow-sm border border-gray-200 max-w-sm mx-4">
    <h1 class="text-2xl font-extrabold text-gray-950 mb-2">Demonstração de Pop-up</h1>
    <p class="text-gray-600 mb-6 text-sm">Clique no botão abaixo para abrir a janela de diálogo interativa.</p>
    
    <!-- Botão de Disparo -->
    <button id="openBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-6 rounded-xl shadow-md transition duration-150 cursor-pointer">
      Abrir Pop-up
    </button>
  </div>

  <!-- Estrutura do Pop-up (A classe 'hidden' oculta tudo inicialmente) -->
  <div id="popupOverlay" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
    
    <!-- Caixa do Pop-up -->
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border border-gray-150 transform transition-all">
      
      <!-- Cabeçalho -->
      <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
        <h3 class="text-lg font-bold text-gray-900">Configuração Concluída</h3>
        <!-- Botão Fechar (X) -->
        <button id="closeX" class="text-gray-400 hover:text-gray-600 text-3xl font-light cursor-pointer leading-none">&times;</button>
      </div>

      <!-- Corpo do Texto -->
      <div class="px-6 py-6">
        <p class="text-sm leading-relaxed text-gray-600">
          Agora os estilos devem carregar perfeitamente! Este exemplo foi adaptado com a nova biblioteca do Tailwind CSS para navegadores modernos.
        </p>
      </div>

      <!-- Rodapé com Ações -->
      <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end space-x-3">
        <button id="closeBtn" class="bg-white hover:bg-gray-100 text-gray-700 font-medium py-2 px-5 border border-gray-300 rounded-xl text-sm transition duration-150 cursor-pointer">
          Cancelar
        </button>
        <button class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-5 rounded-xl text-sm shadow-sm transition duration-150 cursor-pointer">
          Confirmar
        </button>
      </div>

    </div>
  </div>

  <!-- Script de Controle -->
  <script>
    // Seleção dos elementos usando IDs simplificados
    const openBtn = document.getElementById('openBtn');
    const popupOverlay = document.getElementById('popupOverlay');
    const closeX = document.getElementById('closeX');
    const closeBtn = document.getElementById('closeBtn');

    // Função única para alternar a exibição
    const togglePopup = () => {
      popupOverlay.classList.toggle('hidden');
    };

    // Vincular os cliques dos botões para acionar a função
    openBtn.addEventListener('click', togglePopup);
    closeX.addEventListener('click', togglePopup);
    closeBtn.addEventListener('click', togglePopup);

    // Fechar ao clicar na área escura de fora
    popupOverlay.addEventListener('click', (e) => {
      if (e.target === popupOverlay) {
        togglePopup();
      }
    });
  </script>

</body>
</html>
