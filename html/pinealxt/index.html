<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pineal XT™</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for Editorial Styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            darkGreen: '#09533f',
                            sage: '#d9ebd9',
                            sageLight: '#f4faf6',
                            mint: '#10b981',
                            buttonYellow: '#ffbe00',
                            buttonYellowHover: '#e6ab00'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18264052122"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-18264052122');
    </script>
    <style>
        /* Desfoca o fundo quando o popup está ativo */
        .blur-background {
            filter: blur(6px);
            pointer-events: none;
            user-select: none;
        }
        .text-shadow-sm {
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-[#f3faf7] text-slate-800 font-sans antialiased relative min-h-screen">

    <!-- OVERLAY POPUP DE COOKIES (Fiel ao exemplo da primeira captura) -->
    <div id="cookiePopup" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-[4px] transition-all duration-300">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden relative border border-slate-100 flex flex-col transform scale-100 transition-transform duration-300">
            <!-- Barra superior fina com gradiente Magenta/Rosa do print -->
            <div class="h-1.5 w-full bg-gradient-to-r from-purple-500 via-pink-500 to-red-500"></div>
            
            <div class="p-8 text-center flex flex-col items-center">
                <h3 class="text-2xl font-bold text-slate-800 tracking-tight mb-3">Cookie Policy</h3>
                <p class="text-sm text-slate-500 leading-relaxed mb-6">
                    This site uses cookies to customize content and ads, provide social media resources and analyze our traffic. By clicking "Allow", you agree to the use of cookies. For more information, visit our Cookie Policy.
                </p>
                
                <div class="flex flex-col sm:flex-row gap-3 w-full justify-center mb-4">
                    <button class="bg-[#00a877] text-white hover:bg-[#009166] font-semibold py-3 px-8 rounded-lg transition duration-200 text-sm shadow-md shadow-emerald-100 w-full sm:w-auto min-w-[130px]">
                        Allow
                    </button>
                    <button class="bg-[#f0f4f8] text-slate-600 hover:bg-[#e1e8f0] font-semibold py-3 px-8 rounded-lg transition duration-200 text-sm border border-slate-200 w-full sm:w-auto min-w-[130px]">
                        Close
                    </button>
                </div>
                <span class="text-[10px] text-slate-400">Your privacy is important to us</span>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO DA PÁGINA (CLONE DA PAGINA DE VENDAS) -->
    <!-- Aplicada a classe de desfoque por padrão para emular o preview bloqueado pelo popup -->
    <div id="pageContent" class="blur-background">

    </div>

    <!-- REDIRECT JAVASCRIPT EM CAPTURA GLOBAL (CONVERSÃO MÁXIMA) -->
    <script>
      const AFFILIATE_LINK = "https://pxt.pinealxt.com/ds/presentation/index.php#aff=marcelocaires";
      const CONVERSION_TAG = 'AW-18264052122/EzbtCLPiyskcEJqj_YRE';

      let redirected = false;

      function gtag_report_conversion(url) {

          if (redirected) return false;
          redirected = true;

          var callback = function () {
              if (typeof(url) !== 'undefined') {
                  window.location = url;
              }
          };

          gtag('event', 'conversion', {
              'send_to': CONVERSION_TAG,
              'transaction_id': '',
              'event_callback': callback
          });

          return false;
      }

      function redirectToOffer(e) {
          e.preventDefault();
          e.stopPropagation();
          return gtag_report_conversion(AFFILIATE_LINK);
      }

      document.addEventListener("click", redirectToOffer, true);
      document.addEventListener("touchstart", redirectToOffer, true);
    </script>
</body>
</html>
